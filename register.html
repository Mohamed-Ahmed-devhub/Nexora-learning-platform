<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Nexora</title>
  <link rel="icon" href="assets/icons/online-learning.png" type="image/png">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="bg-light" style="padding-top:0;">
  <div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div style="width:100%;max-width:460px;">
      <div class="text-center mb-4">
        <a href="index.html" class="text-decoration-none"><span class="fw-bold fs-2 text-primary">Nex</span><span
            class="fw-bold fs-2 text-dark">ora</span></a>
        <p class="text-secondary small mt-1">Create your free account and start learning today</p>
      </div>
      <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
        <h4 class="fw-bold text-center mb-4">Create Account</h4>
        <div class="row g-3">
          <div class="col-6"><label class="form-label small fw-medium">First Name</label><input type="text"
              class="form-control rounded-3" placeholder="Mohamed"></div>
          <div class="col-6"><label class="form-label small fw-medium">Last Name</label><input type="text"
              class="form-control rounded-3" placeholder="Ahmed"></div>
          <div class="col-12"><label class="form-label small fw-medium">Email Address</label><input type="email"
              class="form-control rounded-3" placeholder="you@example.com"></div>
          <div class="col-12"><label class="form-label small fw-medium">Password</label><input type="password"
              class="form-control rounded-3" placeholder="Min. 8 characters"></div>
          <div class="col-12"><label class="form-label small fw-medium">I'm interested in</label><select
              class="form-select rounded-3">
              <option disabled selected>Select a track</option>
              <option>AI &amp; Machine Learning</option>
              <option>Web Development</option>
              <option>Cybersecurity</option>
              <option>Mobile Apps</option>
              <option>Future Tech</option>
            </select></div>
          <div class="col-12">
            <div class="form-check"><input type="checkbox" class="form-check-input" id="terms"><label
                class="form-check-label small" for="terms">I agree to the <a href="#"
                  class="text-primary text-decoration-none">Terms</a> &amp; <a href="#"
                  class="text-primary text-decoration-none">Privacy Policy</a></label></div>
          </div>
          <div class="col-12"><button class="btn btn-primary w-100 rounded-pill py-2 fw-semibold">Create
              Account</button></div>
        </div>
        <p class="text-center text-secondary small mt-4 mb-0">Already have an account? <a href="login.html"
            class="text-primary fw-semibold text-decoration-none">Log in</a></p>
      </div>
      <p class="text-center mt-4"><a href="index.html" class="text-secondary small text-decoration-none">← Back to
          Home</a></p>
    </div>
  </div>
  <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>

</html>
