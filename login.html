<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Nexora</title>
  <link rel="icon" href="assets/icons/online-learning.png" type="image/png">
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light" style="padding-top:0;">

  <div class="min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div style="width:100%;max-width:420px;">

      <div class="text-center mb-4">
        <a href="index.html" class="text-decoration-none">
          <span class="fw-bold fs-2 text-primary">Nex</span><span class="fw-bold fs-2 text-dark">ora</span>
        </a>
        <p class="text-secondary small mt-1">Welcome back — log in to your account</p>
      </div>

      <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
        <h4 class="fw-bold text-center mb-4">Log In</h4>

        <form action="index.html" >
          <div class="mb-3">
            <label class="form-label small fw-medium">Email Address</label>
            <input type="email" class="form-control rounded-3" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <div class="d-flex justify-content-between">
              <label class="form-label small fw-medium mb-0">Password</label>
              <a href="#" class="text-primary small text-decoration-none">Forgot password?</a>
            </div>
            <input type="password" class="form-control rounded-3 mt-1" placeholder="••••••••" required>
          </div>
          <div class="mb-4 form-check">
            <input type="checkbox" class="form-check-input" id="remember">
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-semibold">Log In</button>
        </form>

        <p class="text-center text-secondary small mt-4 mb-0">
          Don't have an account?
          <a href="register.html" class="text-primary fw-semibold text-decoration-none">Sign up free</a>
        </p>
      </div>

      <p class="text-center mt-4">
        <a href="index.html" class="text-secondary small text-decoration-none">← Back to Home</a>
      </p>
    </div>
  </div>

  <script src="assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
